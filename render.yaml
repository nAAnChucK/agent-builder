services:
  - type: web
    name: agent-builder
    runtime: docker
    healthCheckPath: /api/tools
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AUTH_USERNAME
        value: admin
      - key: AUTH_PASSWORD
        sync: false
      - key: DATA_DIR
        value: /data
    disk:
      name: agent-builder-data
      mountPath: /data
      sizeGB: 1
